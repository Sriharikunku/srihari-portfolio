<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Srihari Kunku — Cloud SQL Server DBA & Azure Specialist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Basic Reset & Typography -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #151932 0, #050611 45%, #020308 100%);
      color: #f5f7ff;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }
    img { max-width: 100%; display: block; }

    :root {
      --bg-main: #050611;
      --bg-elevated: #0c1222;
      --bg-chip: #151b2e;
      --accent: #3b82f6;
      --accent-soft: rgba(59, 130, 246, 0.12);
      --accent-green: #22c55e;
      --muted: #9ca3af;
      --border-subtle: rgba(148, 163, 184, 0.18);
      --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.7);
      --radius-lg: 18px;
      --radius-pill: 999px;
      --section-gap: 64px;
      --content-max: 1060px;
    }

    .page {
      min-height: 100vh;
      padding: 20px 20px 80px;
    }

    .shell {
      max-width: var(--content-max);
      margin: 0 auto;
    }

    /* NAVBAR */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: rgba(15, 23, 42, 0.92);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(148, 163, 184, 0.25);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(18px);
      position: sticky;
      top: 12px;
      z-index: 20;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar-circle {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      background: linear-gradient(135deg, #2563eb, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: #e5e7eb;
    }

    .nav-name {
      font-weight: 600;
      font-size: 15px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 22px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
    }

    .nav-links a {
      position: relative;
      padding-bottom: 4px;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 2px;
      border-radius: 999px;
      background: var(--accent);
      transition: width .18s ease-out;
    }

    .nav-links a:hover {
      color: #e5e7eb;
    }
    .nav-links a:hover::after {
      width: 16px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .btn-primary {
      padding: 10px 20px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: none;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.55);
      transition: transform .12s ease-out, box-shadow .12s ease-out, opacity .12s;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 36px rgba(37, 99, 235, 0.75);
      opacity: .96;
    }

    .chip-small {
      display: inline-flex;
      align-items: center;
      padding: 5px 12px;
      border-radius: 999px;
      background: rgba(15, 23, 42, .75);
      border: 1px solid rgba(148, 163, 184, 0.35);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .2em;
      color: var(--muted);
    }

    /* HERO */
    .layout-hero {
      margin-top: 32px;
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(0, 2.4fr);
      gap: 32px;
      align-items: flex-start;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
    }

    .pill-open {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(16, 185, 129, 0.14);
      border-radius: var(--radius-pill);
      padding: 6px 14px;
      border: 1px solid rgba(16, 185, 129, .4);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .18em;
      color: #bbf7d0;
    }

    .pill-open-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent-green);
      box-shadow: 0 0 0 6px rgba(34, 197, 94, .25);
    }

    .pill-location {
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(148, 163, 184, 0.45);
      background: rgba(15, 23, 42, .9);
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .hero-title {
      font-size: clamp(40px, 5vw, 56px);
      font-weight: 800;
      letter-spacing: 0.02em;
      line-height: 1.05;
      margin-bottom: 10px;
    }

    .hero-subtitle {
      font-size: 16px;
      font-weight: 500;
      color: #e5e7eb;
      margin-bottom: 6px;
    }

    .hero-meta {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
    }

    .tag-tech {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--bg-chip);
      border: 1px solid rgba(55, 65, 81, .7);
      color: #e5e7eb;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 26px;
    }

    .link-ghost {
      font-size: 13px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid transparent;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .link-ghost:hover {
      border-color: rgba(148, 163, 184, .6);
      color: #e5e7eb;
    }

    .hero-stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .14em;
    }

    .stat-card {
      background: rgba(15, 23, 42, 0.95);
      border-radius: var(--radius-lg);
      padding: 10px 12px;
      border: 1px solid rgba(55, 65, 81, .85);
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.85);
    }

    .stat-value {
      font-size: 16px;
      font-weight: 700;
      color: #e5e7eb;
      margin-bottom: 3px;
    }

    .stat-label {
      color: var(--muted);
    }

    .hero-right {
      background: radial-gradient(circle at top, rgba(59, 130, 246, 0.32), transparent 52%),
                  linear-gradient(160deg, #020617, #020617 48%, #04071a 100%);
      border-radius: 32px;
      border: 1px solid rgba(148, 163, 184, .4);
      padding: 22px 22px 20px;
      box-shadow: var(--shadow-soft);
      position: relative;
      overflow: hidden;
    }

    .hero-right-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .hero-right-name {
      font-size: 14px;
      font-weight: 600;
    }

    .hero-right-badge {
      font-size: 11px;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(96, 165, 250, 0.85);
      background: rgba(15, 23, 42, 0.85);
      color: #bfdbfe;
      letter-spacing: .16em;
    }

    .mini-metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    .mini-card {
      padding: 10px 10px;
      border-radius: 14px;
      background: rgba(15, 23, 42, .9);
      border: 1px solid rgba(55, 65, 81, .9);
    }

    .mini-value {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .mini-caption {
      color: var(--muted);
      line-height: 1.4;
    }

    /* SECTION WRAPPERS */
    section {
      margin-top: var(--section-gap);
    }

    .section-label {
      font-size: 11px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 18px;
    }

    .card {
      background: rgba(15, 23, 42, .96);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-soft);
    }

    /* STACK SECTION */
    .stack-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      font-size: 13px;
    }

    .stack-col h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #e5e7eb;
    }

    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      padding: 5px 8px;
      border-radius: var(--radius-pill);
      background: var(--bg-chip);
      border: 1px solid rgba(55, 65, 81, .75);
      font-size: 11px;
      color: #e5e7eb;
    }

    /* EXPERIENCE */
    .exp-timeline {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .exp-item {
      display: grid;
      grid-template-columns: 2.2fr 3.2fr;
      gap: 18px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(31, 41, 55, .9);
    }

    .exp-item:last-child {
      border-bottom: none;
    }

    .exp-role {
      font-size: 14px;
      font-weight: 600;
    }

    .exp-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    .exp-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
      font-size: 11px;
    }

    .exp-badge {
      padding: 4px 8px;
      border-radius: var(--radius-pill);
      background: rgba(15, 23, 42, .9);
      border: 1px solid rgba(55, 65, 81, .8);
      color: #e5e7eb;
    }

    .exp-details ul {
      padding-left: 18px;
      font-size: 13px;
      color: #e5e7eb;
    }

    .exp-details li {
      margin-bottom: 6px;
    }

    /* IMPACT */
    .impact-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    .impact-card {
      padding: 14px 14px;
      border-radius: var(--radius-lg);
      background: rgba(15, 23, 42, .96);
      border: 1px solid rgba(55, 65, 81, .9);
    }

    .impact-value {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .impact-desc {
      color: var(--muted);
      text-transform: none;
      letter-spacing: normal;
      font-size: 12px;
      margin-top: 4px;
    }

    /* CERTS */
    .cert-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      font-size: 13px;
    }

    .cert-pill {
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(15, 23, 42, .96);
      border: 1px solid rgba(55, 65, 81, .9);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .cert-label {
      font-weight: 500;
